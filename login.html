<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>세움디자인하우징 OS - 로그인</title>
  <meta name="theme-color" content="#0f172a">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/seum-os-192.png">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.100.0"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js').catch(function () {});
      });
    }
  </script>
</head>
<body class="login-page auth-page" style="visibility: hidden;">
  <div class="auth-card login-card">
    <div class="auth-header">
      <div class="auth-brand" aria-hidden="true">S</div>
      <h1 class="auth-title">세움디자인하우징 OS</h1>
      <p class="auth-sub">직원 전용 내부 운영 시스템</p>
    </div>
    <form id="login-form" class="auth-form" novalidate>
      <label for="login-email" class="auth-label">이메일</label>
      <input type="email" id="login-email" class="auth-input" placeholder="이메일 주소" required autocomplete="username">
      <label for="login-password" class="auth-label">비밀번호</label>
      <input type="password" id="login-password" class="auth-input" placeholder="비밀번호" required autocomplete="current-password">
      <p id="login-error" class="auth-error" aria-live="polite"></p>
      <button type="submit" class="auth-btn" id="login-btn">로그인</button>
    </form>
    <p class="auth-footer">
      <a href="signup.html" class="auth-link">직원 회원가입</a>
    </p>
  </div>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (function () {
      // 세션 확인: 이미 로그인된 사용자는 login.html을 건너뛰고 대시보드로 이동
      var supa = window.seumSupabase;
      var revealed = false;
      function revealBody() {
        if (revealed) return;
        revealed = true;
        document.body.style.visibility = '';
      }
      if (!supa || !supa.auth || !supa.auth.getSession) {
        revealBody();
        return;
      }
      var fallback = setTimeout(revealBody, 5000);
      supa.auth.getSession()
        .then(function (res) {
          clearTimeout(fallback);
          var session = res && res.data && res.data.session;
          if (session && session.user) {
            window.location.replace('dashboard.html');
          } else {
            revealBody();
          }
        })
        .catch(function () {
          clearTimeout(fallback);
          revealBody();
        });
    })();
  </script>
  <script>
    (function () {
      var form = document.getElementById('login-form');
      var emailInput = document.getElementById('login-email');
      var passwordInput = document.getElementById('login-password');
      var errorEl = document.getElementById('login-error');
      var btn = document.getElementById('login-btn');

      (function showErrorFromUrl() {
        var params = new URLSearchParams(window.location.search);
        var error = params.get('error');
        if (error === 'no_employee') {
          errorEl.textContent = '직원 정보가 등록되지 않았습니다. 관리자에게 문의하세요.';
        } else if (error === 'not_approved') {
          errorEl.textContent = '승인되지 않은 계정입니다. 관리자에게 문의하세요.';
        }
      })();

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        errorEl.textContent = '';
        var email = (emailInput.value || '').trim();
        var password = passwordInput.value || '';
        if (!email || !password) {
          errorEl.textContent = '이메일과 비밀번호를 입력해 주세요.';
          return;
        }
        btn.disabled = true;
        (window.seumAuth && window.seumAuth.login ? window.seumAuth.login(email, password) : Promise.resolve({ success: false, error: '로그인을 사용할 수 없습니다.' }))
          .then(function (result) {
            btn.disabled = false;
            if (result && !result.success) {
              errorEl.textContent = result.error || '로그인에 실패했습니다.';
            }
          })
          .catch(function () {
            btn.disabled = false;
            errorEl.textContent = '로그인 중 오류가 발생했습니다.';
          });
      });
    })();
  </script>
</body>
</html>
