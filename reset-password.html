<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>세움디자인하우징 OS - 새 비밀번호 설정</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.101.0/dist/umd/supabase.js"></script>
</head>
<body class="login-page auth-page">
  <div class="auth-card login-card">
    <div class="auth-header">
      <div class="auth-brand" aria-hidden="true">S</div>
      <h1 class="auth-title">새 비밀번호 설정</h1>
      <p class="auth-sub">재설정 링크를 통해 접속한 계정에 대해 새 비밀번호를 설정합니다</p>
    </div>
    <form id="reset-form" class="auth-form" novalidate>
      <label for="reset-password" class="auth-label">새 비밀번호</label>
      <input type="password" id="reset-password" class="auth-input" placeholder="새 비밀번호 (6자 이상)" required autocomplete="new-password" minlength="6">
      <label for="reset-password-confirm" class="auth-label">새 비밀번호 확인</label>
      <input type="password" id="reset-password-confirm" class="auth-input" placeholder="새 비밀번호 확인" required autocomplete="new-password" minlength="6">
      <p id="reset-message" class="auth-error auth-message" aria-live="polite"></p>
      <button type="submit" class="auth-btn" id="reset-btn" disabled>비밀번호 변경</button>
    </form>
    <p class="auth-footer">
      <a href="login.html" class="auth-link">로그인으로 돌아가기</a>
    </p>
  </div>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (function () {
      var form = document.getElementById('reset-form');
      var passwordInput = document.getElementById('reset-password');
      var confirmInput = document.getElementById('reset-password-confirm');
      var messageEl = document.getElementById('reset-message');
      var btn = document.getElementById('reset-btn');

      function showMessage(text, isError) {
        messageEl.textContent = text || '';
        messageEl.classList.toggle('auth-error', isError !== false);
        messageEl.classList.toggle('auth-message-success', isError === false && !!text);
      }

      var supa = window.seumSupabase;
      var recoveryReady = false;

      // Supabase는 재설정 링크의 해시(#access_token=...&type=recovery)를 자동으로 읽어
      // 복구 세션을 수립하고 'PASSWORD_RECOVERY' 이벤트를 발생시킨다.
      if (supa && supa.auth && typeof supa.auth.onAuthStateChange === 'function') {
        supa.auth.onAuthStateChange(function (event) {
          if (event === 'PASSWORD_RECOVERY') {
            recoveryReady = true;
            btn.disabled = false;
            showMessage('새 비밀번호를 입력해 주세요.', false);
          }
        });
      }

      // 링크 없이 접속하거나 토큰이 만료된 경우에도 기존 세션이 있으면 진행 가능
      if (supa && supa.auth && typeof supa.auth.getSession === 'function') {
        supa.auth.getSession().then(function (res) {
          var session = res && res.data && res.data.session;
          if (session && session.user) {
            recoveryReady = true;
            btn.disabled = false;
          } else if (!window.location.hash || window.location.hash.indexOf('access_token') === -1) {
            showMessage('유효한 재설정 링크가 아닙니다. 메일의 링크를 다시 눌러 주세요.', true);
          }
        }).catch(function () {
          showMessage('세션을 확인할 수 없습니다. 메일의 링크를 다시 눌러 주세요.', true);
        });
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        showMessage('', true);
        var pwd = passwordInput.value || '';
        var confirm = confirmInput.value || '';
        if (!pwd || pwd.length < 6) {
          showMessage('비밀번호는 6자 이상 입력해 주세요.', true);
          return;
        }
        if (pwd !== confirm) {
          showMessage('비밀번호가 일치하지 않습니다.', true);
          return;
        }
        if (!recoveryReady) {
          showMessage('재설정 세션이 준비되지 않았습니다. 메일의 링크를 다시 눌러 주세요.', true);
          return;
        }
        btn.disabled = true;
        (window.seumAuth && window.seumAuth.updatePassword
          ? window.seumAuth.updatePassword(pwd)
          : Promise.resolve({ success: false, error: '비밀번호 변경을 사용할 수 없습니다.' }))
          .then(function (result) {
            btn.disabled = false;
            if (result && result.success) {
              showMessage('비밀번호가 변경되었습니다. 새 비밀번호로 로그인해 주세요.', false);
              passwordInput.value = '';
              confirmInput.value = '';
              setTimeout(function () { window.location.href = 'login.html'; }, 1500);
            } else {
              showMessage((result && result.error) || '비밀번호 변경에 실패했습니다.', true);
            }
          })
          .catch(function () {
            btn.disabled = false;
            showMessage('비밀번호 변경 중 오류가 발생했습니다.', true);
          });
      });
    })();
  </script>
</body>
</html>
