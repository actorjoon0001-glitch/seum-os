<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employees — Seum OS</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div id="sidebarBackdrop" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:99;"></div>

  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" id="mobileMenuBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <span class="page-title">Employees</span>
      </div>
    </header>

    <div class="page-content">
      <div class="page-header">
        <div>
          <h1>Employee Management</h1>
          <p>Manage team members, departments, and roles.</p>
        </div>
        <button class="btn btn-primary" id="addEmployeeBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Employee
        </button>
      </div>

      <div class="toolbar">
        <div class="search-box">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Search by name, department…" />
        </div>
        <select class="form-control" id="deptFilter" style="width:auto;">
          <option value="">All Departments</option>
          <option value="Sales">Sales</option>
          <option value="Design">Design</option>
          <option value="Operations">Operations</option>
          <option value="Management">Management</option>
        </select>
        <select class="form-control" id="statusFilter" style="width:auto;">
          <option value="">All Statuses</option>
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
        </select>
      </div>

      <!-- Employee Cards Grid -->
      <div id="employeeGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:var(--sp-5);"></div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="employeeModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Add Employee</span>
      <button class="modal-close" id="closeModal">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <form id="employeeForm" novalidate>
        <input type="hidden" id="employeeId" />
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="eName">Full Name *</label>
            <input class="form-control" id="eName" type="text" placeholder="Full name" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="eEmail">Email *</label>
            <input class="form-control" id="eEmail" type="email" placeholder="name@seumhousing.com" required />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="ePhone">Phone</label>
            <input class="form-control" id="ePhone" type="tel" placeholder="010-0000-0000" />
          </div>
          <div class="form-group">
            <label class="form-label" for="eDept">Department</label>
            <select class="form-control" id="eDept">
              <option value="Sales">Sales</option>
              <option value="Design">Design</option>
              <option value="Operations">Operations</option>
              <option value="Management">Management</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="ePosition">Position</label>
            <input class="form-control" id="ePosition" type="text" placeholder="e.g. Senior Designer" />
          </div>
          <div class="form-group">
            <label class="form-label" for="eHireDate">Hire Date</label>
            <input class="form-control" id="eHireDate" type="date" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="eStatus">Status</label>
          <select class="form-control" id="eStatus">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="cancelModal">Cancel</button>
      <button class="btn btn-primary" id="saveEmployee">Save Employee</button>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script src="js/storage.js"></script>
<script src="js/nav.js"></script>
<script src="js/employees.js"></script>
</body>
</html>
