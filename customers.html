<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customers — Seum OS</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div id="sidebarBackdrop" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:99;"></div>

  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" id="mobileMenuBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <span class="page-title">Customers</span>
      </div>
    </header>

    <div class="page-content">
      <div class="page-header">
        <div>
          <h1>Customer Database</h1>
          <p>Manage all customer records and contact information.</p>
        </div>
        <button class="btn btn-primary" id="addCustomerBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Customer
        </button>
      </div>

      <div class="toolbar">
        <div class="search-box">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Search by name, phone, or email…" />
        </div>
        <select class="form-control" id="statusFilter" style="width:auto;">
          <option value="">All Statuses</option>
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
        </select>
        <select class="form-control" id="sourceFilter" style="width:auto;">
          <option value="">All Sources</option>
          <option value="walk-in">Walk-in</option>
          <option value="referral">Referral</option>
          <option value="online">Online</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Phone</th>
              <th>Email</th>
              <th>Address</th>
              <th>Source</th>
              <th>Status</th>
              <th>Visits</th>
              <th style="text-align:right;">Actions</th>
            </tr>
          </thead>
          <tbody id="customersBody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Add/Edit Customer Modal -->
<div class="modal-backdrop" id="customerModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Add Customer</span>
      <button class="modal-close" id="closeModal">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <form id="customerForm" novalidate>
        <input type="hidden" id="customerId" />
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="cName">Full Name *</label>
            <input class="form-control" id="cName" type="text" placeholder="홍길동" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="cPhone">Phone *</label>
            <input class="form-control" id="cPhone" type="tel" placeholder="010-0000-0000" required />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="cEmail">Email</label>
            <input class="form-control" id="cEmail" type="email" placeholder="email@example.com" />
          </div>
          <div class="form-group">
            <label class="form-label" for="cSource">Source</label>
            <select class="form-control" id="cSource">
              <option value="walk-in">Walk-in</option>
              <option value="referral">Referral</option>
              <option value="online">Online</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="cAddress">Address</label>
          <input class="form-control" id="cAddress" type="text" placeholder="서울시 강남구…" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="cStatus">Status</label>
            <select class="form-control" id="cStatus">
              <option value="active">Active</option>
              <option value="inactive">Inactive</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="cNotes">Notes</label>
          <textarea class="form-control" id="cNotes" placeholder="Any important details about this customer…"></textarea>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="cancelModal">Cancel</button>
      <button class="btn btn-primary" id="saveCustomer">Save Customer</button>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script src="js/storage.js"></script>
<script src="js/nav.js"></script>
<script src="js/customers.js"></script>
</body>
</html>
