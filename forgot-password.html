<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>세움디자인하우징 OS - 비밀번호 찾기</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.101.0/dist/umd/supabase.js"></script>
</head>
<body class="login-page auth-page">
  <div class="auth-card login-card">
    <div class="auth-header">
      <div class="auth-brand" aria-hidden="true">S</div>
      <h1 class="auth-title">비밀번호 재설정</h1>
      <p class="auth-sub">가입한 이메일로 재설정 링크를 보내드립니다</p>
    </div>
    <p class="auth-notice">기존 비밀번호는 복원되지 않고, 메일의 링크를 통해 새 비밀번호를 직접 설정하게 됩니다.</p>
    <form id="forgot-form" class="auth-form" novalidate>
      <label for="forgot-email" class="auth-label">이메일</label>
      <input type="email" id="forgot-email" class="auth-input" placeholder="가입한 이메일 주소" required autocomplete="email">
      <p id="forgot-message" class="auth-error auth-message" aria-live="polite"></p>
      <button type="submit" class="auth-btn" id="forgot-btn">재설정 메일 발송</button>
    </form>
    <p class="auth-footer">
      <a href="login.html" class="auth-link">로그인으로 돌아가기</a>
    </p>
  </div>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (function () {
      var form = document.getElementById('forgot-form');
      var emailInput = document.getElementById('forgot-email');
      var messageEl = document.getElementById('forgot-message');
      var btn = document.getElementById('forgot-btn');

      function showMessage(text, isError) {
        messageEl.textContent = text || '';
        messageEl.classList.toggle('auth-error', isError !== false);
        messageEl.classList.toggle('auth-message-success', isError === false && !!text);
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        showMessage('', true);
        var email = (emailInput.value || '').trim();
        if (!email) {
          showMessage('이메일을 입력해 주세요.', true);
          return;
        }
        btn.disabled = true;
        (window.seumAuth && window.seumAuth.requestPasswordReset
          ? window.seumAuth.requestPasswordReset(email)
          : Promise.resolve({ success: false, error: '비밀번호 재설정을 사용할 수 없습니다.' }))
          .then(function (result) {
            btn.disabled = false;
            if (result && result.success) {
              showMessage('입력하신 이메일로 재설정 링크를 보냈습니다. 메일함을 확인해 주세요.', false);
              emailInput.value = '';
            } else {
              showMessage((result && result.error) || '재설정 메일 발송에 실패했습니다.', true);
            }
          })
          .catch(function () {
            btn.disabled = false;
            showMessage('재설정 메일 발송 중 오류가 발생했습니다.', true);
          });
      });
    })();
  </script>
</body>
</html>
